<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Strix United</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/jS1r3K6.png">

<!-- Open Graph — preview no WhatsApp, Discord, etc. -->
<meta property="og:type"        content="website">
<meta property="og:url"         content="https://strixunited.com.br/">
<meta property="og:title"       content="Strix United — Pro Clubs">
<meta property="og:description" content="Painel oficial da Strix United. Histórico, escalações, estatísticas e muito mais.">
<meta property="og:image"       content="https://i.imgur.com/jS1r3K6.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta property="og:site_name"   content="Strix United">
<meta property="og:locale"      content="pt_BR">

<!-- Twitter Card (Discord usa isso também) -->
<meta name="twitter:card"        content="summary">
<meta name="twitter:title"       content="Strix United — Pro Clubs">
<meta name="twitter:description" content="Painel oficial da Strix United. Histórico, escalações, estatísticas e muito mais.">
<meta name="twitter:image"       content="https://i.imgur.com/jS1r3K6.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#020409}
  iframe{width:100%;height:100%;border:none;display:block}
</style>
</head>
<body>
<iframe id="app" allow="clipboard-read; clipboard-write; camera" title="Strix United"></iframe>
<script>
  var BASE = 'https://script.google.com/macros/s/AKfycby3sH3AvnmoZ4H4AK5oYNddTHshoyg5vCqoO34L6v-uMJ9B5I7OcR6yD52aA4A65q-nwg/exec';
  var iframe = document.getElementById('app');

  // ── Escuta mensagens do iframe (token save/clear) ──
  window.addEventListener('message', function(e) {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === 'strix_tok' && e.data.v) {
      try { localStorage.setItem('strix_tok', e.data.v); } catch(ex) {}
    }
    if (e.data.type === 'strix_clear_tok') {
      try { localStorage.removeItem('strix_tok'); } catch(ex) {}
    }
  });

  // ── Determina o src do iframe ──
  var params  = new URLSearchParams(window.location.search);
  var code    = params.get('code');
  var token   = params.get('token');
  var stored  = '';
  try { stored = localStorage.getItem('strix_tok') || ''; } catch(ex) {}

  var src;
  if (code)        src = BASE + '?code='  + encodeURIComponent(code);
  else if (token)  src = BASE + '?token=' + encodeURIComponent(token);
  else if (stored) src = BASE + '?token=' + encodeURIComponent(stored);
  else             src = BASE;

  iframe.src = src;
  if (code || token) window.history.replaceState({}, '', '/');
</script>
</body>
</html>
