<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Strix United</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/jS1r3K6.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#020409}
  iframe{width:100%;height:100%;border:none;display:block}
</style>
</head>
<body>
<iframe id="app" allow="clipboard-read; clipboard-write; camera" title="Strix United"></iframe>
<script>
  var BASE   = 'https://script.google.com/macros/s/AKfycby3sH3AvnmoZ4H4AK5oYNddTHshoyg5vCqoO34L6v-uMJ9B5I7OcR6yD52aA4A65q-nwg/exec';
  var params = new URLSearchParams(window.location.search);
  var code   = params.get('code');
  var token  = params.get('token');

  if (code) {
    // Discord redirecionou aqui com ?code= → passa pro iframe processar o OAuth
    document.getElementById('app').src = BASE + '?code=' + encodeURIComponent(code);
    window.history.replaceState({}, '', '/');
  } else if (token) {
    // Token direto (acesso legado ou manual)
    document.getElementById('app').src = BASE + '?token=' + encodeURIComponent(token);
    window.history.replaceState({}, '', '/');
  } else {
    // Acesso normal — iframe carrega login/dashboard normalmente
    document.getElementById('app').src = BASE;
  }
</script>
</body>
</html>
