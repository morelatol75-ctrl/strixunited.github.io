<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Strix United</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/jS1r3K6.png">

<!-- Open Graph -->
<meta property="og:type"         content="website">
<meta property="og:url"          content="https://strixunited.com.br/">
<meta property="og:title"        content="Strix United — Pro Clubs">
<meta property="og:description"  content="Painel oficial da Strix United. Histórico, escalações, estatísticas e muito mais.">
<meta property="og:image"        content="https://strixunited.com.br/logo.png">
<meta property="og:site_name"    content="Strix United">
<meta name="twitter:card"        content="summary">
<meta name="twitter:title"       content="Strix United — Pro Clubs">
<meta name="twitter:description" content="Painel oficial da Strix United.">
<meta name="twitter:image"       content="https://strixunited.com.br/logo.png">

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#020409}
  iframe{width:100%;height:100%;border:none;display:block}
  #splash{position:fixed;inset:0;background:#020409;display:flex;align-items:center;justify-content:center;z-index:9}
  .ring{width:32px;height:32px;border:2px solid rgba(37,99,235,.2);border-top-color:#2563EB;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="splash"><div class="ring"></div></div>
<iframe id="app" allow="clipboard-read; clipboard-write; camera" title="Strix United" style="opacity:0;transition:opacity .3s"></iframe>

<script>
var BASE = 'https://script.google.com/macros/s/AKfycby3sH3AvnmoZ4H4AK5oYNddTHshoyg5vCqoO34L6v-uMJ9B5I7OcR6yD52aA4A65q-nwg/exec';
var app  = document.getElementById('app');
var spl  = document.getElementById('splash');

// Quando iframe carrega, esconde o splash
app.addEventListener('load', function() {
  spl.style.display = 'none';
  app.style.opacity = '1';
});

// Recebe mensagem do iframe pra limpar token (sessão expirada)
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'strix_clear_tok') {
    try { localStorage.removeItem('strix_tok'); } catch(ex) {}
  }
});

function loadApp(src) {
  app.src = src;
}

var params = new URLSearchParams(window.location.search);
var code   = params.get('code');
var token  = params.get('token');

if (code) {
  // ── OAuth: troca code por token via fetch JSON (salva no localStorage first-party) ──
  window.history.replaceState({}, '', '/');
  fetch(BASE + '?action=auth&code=' + encodeURIComponent(code))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.tok) {
        try { localStorage.setItem('strix_tok', d.tok); } catch(ex) {}
        loadApp(BASE + '?token=' + encodeURIComponent(d.tok));
      } else {
        loadApp(BASE); // erro no OAuth, mostra login
      }
    })
    .catch(function() { loadApp(BASE); });

} else if (token) {
  // Token passado explicitamente na URL
  window.history.replaceState({}, '', '/');
  try { localStorage.setItem('strix_tok', token); } catch(ex) {}
  loadApp(BASE + '?token=' + encodeURIComponent(token));

} else {
  // Verifica localStorage — token salvo de sessão anterior
  var stored = '';
  try { stored = localStorage.getItem('strix_tok') || ''; } catch(ex) {}
  loadApp(stored ? BASE + '?token=' + encodeURIComponent(stored) : BASE);
}
</script>
</body>
</html>
