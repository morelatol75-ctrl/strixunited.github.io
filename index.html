<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Strix United</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/jS1r3K6.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#020409}
  iframe{width:100%;height:100%;border:none;display:block}
</style>
</head>
<body>
<iframe id="app" allow="clipboard-read; clipboard-write; camera" title="Strix United"></iframe>
<script>
  var BASE = 'https://script.google.com/macros/s/AKfycby3sH3AvnmoZ4H4AK5oYNddTHshoyg5vCqoO34L6v-uMJ9B5I7OcR6yD52aA4A65q-nwg/exec';
  
  // Detecta se voltou do OAuth com ?token= na URL
  var params  = new URLSearchParams(window.location.search);
  var token   = params.get('token');
  var src     = token ? BASE + '?token=' + encodeURIComponent(token) : BASE;

  document.getElementById('app').src = src;

  // Limpa o token da URL sem recarregar a página
  if (token) {
    window.history.replaceState({}, '', window.location.pathname);
  }
</script>
</body>
</html>
